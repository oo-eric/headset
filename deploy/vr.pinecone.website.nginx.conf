# vr.pinecone.website — phone-in-headset VR experiments (static Vite build).
#
# Reuses the *.pinecone.website wildcard cert (acme.sh) — NO certbot for this host.
# A specific server_name block overrides the *.pinecone.website catch-all redirect,
# so this serves the site instead of bouncing to rack.and.pinecone.website.
#
# Installed at /etc/nginx/sites-available/vr.pinecone.website, symlinked into
# sites-enabled/. Webroot: /var/www/vr.pinecone.website (owned by eric).

server {
    listen 80;
    listen [::]:80;
    server_name vr.pinecone.website;

    location ^~ /.well-known/ { root /var/www/vr.pinecone.website; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name vr.pinecone.website;

    ssl_certificate     /etc/nginx/ssl/pinecone-wildcard/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/pinecone-wildcard/privkey.pem;

    root /var/www/vr.pinecone.website;
    index index.html;

    location ^~ /.well-known/ { }

    # Vite emits content-hashed, immutable filenames under /assets/ — cache them hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Static files only; each experiment is its own dir with an index.html.
    location / {
        try_files $uri $uri/ =404;
    }
}
